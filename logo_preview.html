<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>A Dash Logo — Blue/Navy Options</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #f8fafc;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    gap: 40px;
  }
  h1 { color: #1e293b; font-size: 24px; font-weight: 600; }
  .options { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
  .card {
    background: white; border-radius: 16px; padding: 32px 40px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
  .card h2 { color: #475569; font-size: 16px; font-weight: 500; }
  .logo-container { padding: 20px; border-radius: 12px; background: #fff; border: 1px solid #e2e8f0; }
  .logo-container-dark { padding: 20px; border-radius: 12px; background: #0f172a; }
  .desc { color: #64748b; font-size: 14px; text-align: center; max-width: 300px; line-height: 1.6; }
  .label { font-size: 12px; color: #94a3b8; margin-top: -8px; }
</style>
</head>
<body>

<h1>A Dash — Blue / Navy Logo Options</h1>

<div class="options">

  <!-- Pattern A: Bright Blue -->
  <div class="card">
    <h2>Pattern A — Bright Blue</h2>

    <p class="label">Light mode</p>
    <div class="logo-container">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
        <defs>
          <linearGradient id="a1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0284c7;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
          </linearGradient>
          <linearGradient id="a2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#0284c7;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:1" />
          </linearGradient>
          <filter id="sa" x="-5%" y="-5%" width="110%" height="130%">
            <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0284c7" flood-opacity="0.35"/>
          </filter>
        </defs>
        <!-- Rounded box -->
        <rect x="4" y="10" width="60" height="60" rx="14" fill="url(#a1)" filter="url(#sa)"/>
        <!-- Speedometer arc -->
        <circle cx="34" cy="42" r="20" fill="none" stroke="white" stroke-width="3" stroke-dasharray="94 32" stroke-opacity="0.9" transform="rotate(-90 34 42)"/>
        <!-- Needle -->
        <line x1="34" y1="42" x2="45" y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.95"/>
        <circle cx="34" cy="42" r="3" fill="white" opacity="0.9"/>
        <!-- Tick dots -->
        <circle cx="16" cy="52" r="1.8" fill="white" opacity="0.5"/>
        <circle cx="15" cy="40" r="1.8" fill="white" opacity="0.5"/>
        <circle cx="21" cy="28" r="1.8" fill="white" opacity="0.5"/>

        <!-- Text -->
        <text x="78" y="52" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#0c4a6e" letter-spacing="-1">A Dash</text>
        <!-- Accent line -->
        <rect x="78" y="58" width="50" height="3" rx="1.5" fill="url(#a2)"/>
        <!-- Speed lines -->
        <rect x="240" y="35" width="28" height="3" rx="1.5" fill="url(#a2)" opacity="0.6"/>
        <rect x="272" y="35" width="14" height="3" rx="1.5" fill="url(#a2)" opacity="0.35"/>
        <rect x="290" y="35" width="7" height="3" rx="1.5" fill="url(#a2)" opacity="0.15"/>
      </svg>
    </div>

    <p class="label">Dark mode</p>
    <div class="logo-container-dark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
        <defs>
          <linearGradient id="a1d" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0284c7;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
          </linearGradient>
          <linearGradient id="a2d" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#0284c7;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:1" />
          </linearGradient>
          <filter id="sad" x="-5%" y="-5%" width="110%" height="130%">
            <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0ea5e9" flood-opacity="0.4"/>
          </filter>
        </defs>
        <rect x="4" y="10" width="60" height="60" rx="14" fill="url(#a1d)" filter="url(#sad)"/>
        <circle cx="34" cy="42" r="20" fill="none" stroke="white" stroke-width="3" stroke-dasharray="94 32" stroke-opacity="0.9" transform="rotate(-90 34 42)"/>
        <line x1="34" y1="42" x2="45" y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.95"/>
        <circle cx="34" cy="42" r="3" fill="white" opacity="0.9"/>
        <circle cx="16" cy="52" r="1.8" fill="white" opacity="0.5"/>
        <circle cx="15" cy="40" r="1.8" fill="white" opacity="0.5"/>
        <circle cx="21" cy="28" r="1.8" fill="white" opacity="0.5"/>
        <text x="78" y="52" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#e0f2fe" letter-spacing="-1">A Dash</text>
        <rect x="78" y="58" width="50" height="3" rx="1.5" fill="url(#a2d)"/>
        <rect x="240" y="35" width="28" height="3" rx="1.5" fill="url(#a2d)" opacity="0.6"/>
        <rect x="272" y="35" width="14" height="3" rx="1.5" fill="url(#a2d)" opacity="0.35"/>
        <rect x="290" y="35" width="7" height="3" rx="1.5" fill="url(#a2d)" opacity="0.15"/>
      </svg>
    </div>

    <p class="desc">鮮やかなスカイブルーのグラデーション。<br>明るくエネルギッシュな印象。<br>スピードラインがダッシュボード感を強調。</p>
  </div>

  <!-- Pattern B: Deep Navy -->
  <div class="card">
    <h2>Pattern B — Deep Navy</h2>

    <p class="label">Light mode</p>
    <div class="logo-container">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
        <defs>
          <linearGradient id="b1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
          </linearGradient>
          <linearGradient id="b2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
          </linearGradient>
          <linearGradient id="b3" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
          </linearGradient>
          <filter id="sb" x="-5%" y="-5%" width="110%" height="130%">
            <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1e3a5f" flood-opacity="0.4"/>
          </filter>
        </defs>
        <!-- Rounded box -->
        <rect x="4" y="10" width="60" height="60" rx="14" fill="url(#b1)" filter="url(#sb)"/>
        <!-- Speedometer arc -->
        <circle cx="34" cy="42" r="20" fill="none" stroke="url(#b3)" stroke-width="3" stroke-dasharray="94 32" transform="rotate(-90 34 42)"/>
        <!-- Needle -->
        <line x1="34" y1="42" x2="45" y2="30" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="34" cy="42" r="3" fill="#60a5fa"/>
        <!-- Tick dots -->
        <circle cx="16" cy="52" r="1.8" fill="#60a5fa" opacity="0.5"/>
        <circle cx="15" cy="40" r="1.8" fill="#93c5fd" opacity="0.5"/>
        <circle cx="21" cy="28" r="1.8" fill="#93c5fd" opacity="0.5"/>

        <!-- Text -->
        <text x="78" y="52" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#1e3a5f" letter-spacing="-1">A Dash</text>
        <!-- Accent line -->
        <rect x="78" y="58" width="50" height="3" rx="1.5" fill="url(#b2)"/>
        <!-- Speed lines -->
        <rect x="240" y="35" width="28" height="3" rx="1.5" fill="url(#b2)" opacity="0.5"/>
        <rect x="272" y="35" width="14" height="3" rx="1.5" fill="url(#b2)" opacity="0.3"/>
        <rect x="290" y="35" width="7" height="3" rx="1.5" fill="url(#b2)" opacity="0.15"/>
      </svg>
    </div>

    <p class="label">Dark mode</p>
    <div class="logo-container-dark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
        <defs>
          <linearGradient id="b1d" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
          </linearGradient>
          <linearGradient id="b2d" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
          </linearGradient>
          <linearGradient id="b3d" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
          </linearGradient>
          <filter id="sbd" x="-5%" y="-5%" width="110%" height="130%">
            <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#2563eb" flood-opacity="0.5"/>
          </filter>
        </defs>
        <rect x="4" y="10" width="60" height="60" rx="14" fill="url(#b1d)" filter="url(#sbd)"/>
        <circle cx="34" cy="42" r="20" fill="none" stroke="url(#b3d)" stroke-width="3" stroke-dasharray="94 32" transform="rotate(-90 34 42)"/>
        <line x1="34" y1="42" x2="45" y2="30" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="34" cy="42" r="3" fill="#93c5fd"/>
        <circle cx="16" cy="52" r="1.8" fill="#60a5fa" opacity="0.5"/>
        <circle cx="15" cy="40" r="1.8" fill="#93c5fd" opacity="0.5"/>
        <circle cx="21" cy="28" r="1.8" fill="#93c5fd" opacity="0.5"/>
        <text x="78" y="52" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#dbeafe" letter-spacing="-1">A Dash</text>
        <rect x="78" y="58" width="50" height="3" rx="1.5" fill="url(#b2d)"/>
        <rect x="240" y="35" width="28" height="3" rx="1.5" fill="url(#b2d)" opacity="0.5"/>
        <rect x="272" y="35" width="14" height="3" rx="1.5" fill="url(#b2d)" opacity="0.3"/>
        <rect x="290" y="35" width="7" height="3" rx="1.5" fill="url(#b2d)" opacity="0.15"/>
      </svg>
    </div>

    <p class="desc">ディープネイビーに落ち着いたブルーのアクセント。<br>信頼感・重厚感のある高級な印象。<br>メーターの光がダークモードで映える。</p>
  </div>

</div>

</body>
</html>
