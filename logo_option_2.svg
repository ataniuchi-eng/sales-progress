<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Icon: Speed/Dashboard meter shape -->
  <circle cx="38" cy="42" r="28" fill="none" stroke="url(#g1)" stroke-width="4" stroke-dasharray="132 44" transform="rotate(-90 38 42)"/>

  <!-- Meter needle -->
  <line x1="38" y1="42" x2="52" y2="28" stroke="url(#g1)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="38" cy="42" r="4" fill="url(#g1)"/>

  <!-- Small dots on the arc -->
  <circle cx="14" cy="55" r="2.5" fill="#0ea5e9" opacity="0.7"/>
  <circle cx="12" cy="38" r="2.5" fill="#4f46e5" opacity="0.7"/>
  <circle cx="20" cy="22" r="2.5" fill="#6366f1" opacity="0.7"/>

  <!-- Text -->
  <text x="78" y="38" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" fill="#64748b" letter-spacing="4">
    A
  </text>
  <text x="78" y="58" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="800" fill="#0f172a" letter-spacing="-0.5">
    Dash
  </text>

  <!-- Dynamic accent lines -->
  <rect x="170" y="50" width="30" height="3" rx="1.5" fill="url(#g2)"/>
  <rect x="205" y="50" width="15" height="3" rx="1.5" fill="url(#g2)" opacity="0.5"/>
  <rect x="225" y="50" width="8" height="3" rx="1.5" fill="url(#g2)" opacity="0.25"/>
</svg>